name: Build and Deploy to GitHub Pages on: push: branches: - main permissions: contents: read pages: write id-token: write jobs: build: runs-on: ubuntu-latest steps: - name: Checkout uses: actions/checkout@v4 - name: Setup Ruby uses: ruby/setup-ruby@v1 with: ruby-version: '3.2' bundler-cache: true - name: Install dependencies run: bundle install - name: Build site run: bundle exec jekyll build -d _site - name: Upload artifact uses: actions/upload-pages-artifact@v3 with: path: _site deploy: needs: build runs-on: ubuntu-latest environment: name: github-pages steps: - name: Deploy to GitHub Pages uses: actions/deploy-pages@v4